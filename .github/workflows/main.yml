name: Deploy Automation RAG Chatbot

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: automation-rag-chatbot-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: https://github.com/${{ github.repository }}

    env:
      REPO_DIR: /home/ubuntu/automation-rag-chatbot
      REPO_URL: https://github.com/${{ github.repository }}.git
      COMPOSE_PROJECT_NAME: automation-rag-chatbot
      MCP_SERVER_URL: ${{ vars.MCP_SERVER_URL }}
      OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL }}
      OLLAMA_CLOUD_URL: ${{ vars.OLLAMA_CLOUD_URL }}
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL }}
      GENERATION_MODEL: ${{ vars.GENERATION_MODEL }}
      DEFAULT_DOMAIN: ${{ vars.DEFAULT_DOMAIN }}
      DEFAULT_API_VERSION: ${{ vars.DEFAULT_API_VERSION }}
      LOG_LEVEL: ${{ vars.LOG_LEVEL }}

    steps:
      - name: Configure SSH
        run: |
          set -euo pipefail
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > key.pem
          chmod 600 key.pem
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        run: |
          set -euo pipefail

          ssh -i key.pem "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" <<EOF
          set -euo pipefail

          REPO_DIR="${REPO_DIR}"
          REPO_URL="${REPO_URL}"
          COMPOSE_PROJECT_NAME="${COMPOSE_PROJECT_NAME}"

          sudo mkdir -p "$(dirname "\$REPO_DIR")"

          if [ ! -d "\$REPO_DIR" ]; then
            echo "Repository not found at \$REPO_DIR. Cloning fresh copy."
            sudo git clone --single-branch --branch main "\$REPO_URL" "\$REPO_DIR"
          elif [ ! -d "\$REPO_DIR/.git" ]; then
            echo "\$REPO_DIR exists but is not a git repository."
            exit 1
          else
            echo "Updating repository at \$REPO_DIR"
            sudo git -C "\$REPO_DIR" fetch origin main
            sudo git -C "\$REPO_DIR" checkout main
            sudo git -C "\$REPO_DIR" pull --ff-only origin main
          fi

          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker is not installed on the EC2 instance."
            exit 1
          fi

          if ! sudo docker compose version >/dev/null 2>&1; then
            echo "Installing docker compose plugin."
            sudo apt-get update
            sudo apt-get install -y docker-compose-plugin
          fi

          sudo docker network inspect rag_network >/dev/null 2>&1 || sudo docker network create rag_network

          sudo tee "\$REPO_DIR/.env" >/dev/null <<EOF_ENV
          MCP_SERVER_URL=${MCP_SERVER_URL:-http://mcp-server:8004/sse}
          OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
          OLLAMA_CLOUD_URL=${OLLAMA_CLOUD_URL:-https://ollama.com/v1}
          OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
          EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text-v2-moe}
          GENERATION_MODEL=${GENERATION_MODEL:-qwen3-coder:480b-cloud}
          DEFAULT_DOMAIN=${DEFAULT_DOMAIN:-ONDC:FIS12}
          DEFAULT_API_VERSION=${DEFAULT_API_VERSION:-2.3.0}
          LOG_LEVEL=${LOG_LEVEL:-INFO}
          EOF_ENV

          sudo test -f "\$REPO_DIR/.env"
          sudo test -f "\$REPO_DIR/docker-compose.yml"

          sudo docker compose \
            -p "\$COMPOSE_PROJECT_NAME" \
            --env-file "\$REPO_DIR/.env" \
            -f "\$REPO_DIR/docker-compose.yml" \
            down --remove-orphans || true
          sudo docker compose \
            -p "\$COMPOSE_PROJECT_NAME" \
            --env-file "\$REPO_DIR/.env" \
            -f "\$REPO_DIR/docker-compose.yml" \
            up -d --build
          sudo docker compose \
            -p "\$COMPOSE_PROJECT_NAME" \
            --env-file "\$REPO_DIR/.env" \
            -f "\$REPO_DIR/docker-compose.yml" \
            ps
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f key.pem
